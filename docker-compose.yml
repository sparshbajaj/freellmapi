version: '3.8'

services:
  freellmapi:
    image: ghcr.io/sparshbajaj/freellmapi:latest
    container_name: freellmapi
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      # You should generate a 64-char hex key for this in production
      - ENCRYPTION_KEY=64402636a6f68c7849c7160759f23924375f9227653782236537822365378223
    volumes:
      - ./data:/app/data
    restart: unless-stopped
