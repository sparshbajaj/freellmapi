name: Sync Release and Build Docker Image

on:
  schedule:
    - cron: '0 * * * *' # Runs every hour to check for upstream updates
  workflow_dispatch: # Allows you to manually trigger the build whenever you want

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      # 1. Check for the latest release on the upstream repository
      - name: Check upstream release
        id: upstream_release
        run: |
          LATEST_RELEASE=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/tashfeenahmed/freellmapi/releases/latest | jq -r .tag_name)
          if [ "$LATEST_RELEASE" == "null" ] || [ -z "$LATEST_RELEASE" ]; then
            echo "No release found on upstream, falling back to main branch or exiting."
            exit 1
          fi
          
          echo "Upstream latest release: $LATEST_RELEASE"
          
          # Check if we already have a tag for this release
          OUR_TAG=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/${{ github.repository }}/git/refs/tags/$LATEST_RELEASE | jq -r .object.sha)
          
          if [ "$OUR_TAG" != "null" ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "new_release=false" >> $GITHUB_OUTPUT
            echo "Release $LATEST_RELEASE is already built."
          else
            echo "new_release=true" >> $GITHUB_OUTPUT
            echo "release=$LATEST_RELEASE" >> $GITHUB_OUTPUT
            echo "Found new release to build: $LATEST_RELEASE"
          fi

      # 2. If a new release is found, checkout the code from the upstream tag
      - name: Checkout upstream code
        if: steps.upstream_release.outputs.new_release == 'true'
        uses: actions/checkout@v4
        with:
          repository: tashfeenahmed/freellmapi
          ref: ${{ steps.upstream_release.outputs.release }}
          path: src

      # 3. Checkout your own repo to pull the Dockerfile into the workspace
      - name: Checkout configuration (Your Dockerfile)
        if: steps.upstream_release.outputs.new_release == 'true'
        uses: actions/checkout@v4
        with:
          path: config

      # 4. Move Dockerfile to the code folder
      - name: Prepare build workspace
        if: steps.upstream_release.outputs.new_release == 'true'
        run: |
          cp config/Dockerfile src/Dockerfile
          cd src

      # 5. Set up Docker Buildx
      - name: Set up Docker Buildx
        if: steps.upstream_release.outputs.new_release == 'true'
        uses: docker/setup-buildx-action@v3

      # 6. Log in to GitHub Container Registry (GHCR)
      - name: Log in to GHCR
        if: steps.upstream_release.outputs.new_release == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 7. Extract lowercase repository name for safe Docker tagging
      - name: Downcase Repo Owner
        if: steps.upstream_release.outputs.new_release == 'true'
        id: string
        run: |
          echo "owner_lc=${OWNER,,}" >> ${GITHUB_OUTPUT}
        env:
          OWNER: ${{ github.repository_owner }}

      # 8. Build and Push the Docker Image
      - name: Build and Push Docker image
        if: steps.upstream_release.outputs.new_release == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./src
          file: ./src/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.string.outputs.owner_lc }}/freellmapi:latest
            ghcr.io/${{ steps.string.outputs.owner_lc }}/freellmapi:${{ steps.upstream_release.outputs.release }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 9. Create a matching release tag in your own repository to mark it as built
      - name: Tag own repository
        if: steps.upstream_release.outputs.new_release == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: 'refs/tags/' + '${{ steps.upstream_release.outputs.release }}',
                sha: context.sha
              });
            } catch (e) {
              console.log("Tag might already exist, ignoring error:", e);
            }
